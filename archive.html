<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="meowrhino archive — archivo personal de proyectos, experimentos y curiosidades.">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <title>meowrhino archive</title>
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="icon" href="favicon/favicon.ico">
  <link rel="stylesheet" href="style.css">
  <script>
    // Anti-flash: dark por defecto en el archive.
    (function() {
      var t = localStorage.getItem("meowrhino-theme");
      if (!t) document.documentElement.setAttribute("data-theme", "dark");
      else if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body>
  <main id="content" role="main"></main>
  <script type="module" src="js/archive-main.js"></script>
</body>
</html>
