<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>welcome + cupón rebotando · pruebas 2026-04-20</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700&display=swap");

  :root {
    --bg: #ffffff;
    --bg-hover: #f7f7f7;
    --text: #000000;
    --text-muted: #888888;
    --border: rgba(0, 0, 0, 0.12);
    --border-hover: rgba(0, 0, 0, 0.35);
    --card: #ffffff;
  }
  [data-theme="dark"] {
    --bg: #121212;
    --bg-hover: #1e1e1e;
    --text: #e0e0e0;
    --text-muted: #666666;
    --border: rgba(255, 255, 255, 0.12);
    --border-hover: rgba(255, 255, 255, 0.35);
    --card: #1a1a1a;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100dvh;
    overflow: hidden;
    font-family: "Inknut Antiqua", serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* Toolbar de pruebas (fuera del welcome real) */
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; gap: 1rem; align-items: center; justify-content: space-between;
    padding: 0.75rem 1.25rem;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    font-size: 0.72rem;
  }
  .toolbar .title { font-weight: 500; letter-spacing: 0.03em; opacity: 0.7; }
  .toolbar .controls { display: flex; gap: 0.4rem; }
  .toolbar button {
    font-family: inherit;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    transition: border-color 0.2s, background 0.2s;
  }
  .toolbar button:hover { border-color: var(--border-hover); background: var(--bg-hover); }
  .toolbar button.active { border-color: var(--text); }

  /* Simulación de la celda welcome */
  .welcome {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    /* margin-top para que no se coma bajo la toolbar del prototipo */
    padding-top: 3rem;
  }

  .welcome-title {
    font-size: clamp(1.6rem, 3.5dvw, 3rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    text-align: center;
    margin: 0;
    user-select: none;
    pointer-events: none;
  }

  /* Cupón rebotando */
  .cupon {
    position: absolute;
    top: 0; left: 0;
    padding: 0.7rem 1.1rem;
    background: var(--card);
    border: 1.5px solid var(--text);
    border-radius: 4px;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    font-family: inherit;
    line-height: 1.25;
    white-space: nowrap;
    transition: background 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
    /* Evita selección/arrastre raro */
    user-select: none;
    z-index: 5;
    will-change: transform;
  }
  .cupon:hover {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .cupon .precio {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    display: block;
  }
  .cupon .caduca {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    display: block;
    margin-top: 0.2rem;
  }
  .cupon:hover .caduca {
    color: var(--bg);
    opacity: 0.75;
  }

  /* En móvil reducir un poco */
  @media (max-width: 560px) {
    .cupon .precio { font-size: 0.95rem; }
    .cupon .caduca { font-size: 0.55rem; }
    .cupon { padding: 0.55rem 0.9rem; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <span class="title">welcome + cupón rebotando · prototipo</span>
  <div class="controls">
    <button data-lang="es" class="active">ES</button>
    <button data-lang="en">EN</button>
    <button data-lang="cat">CAT</button>
    <span style="width: 1px; background: var(--border); margin: 0 0.3rem;"></span>
    <button data-speed="slow">lento</button>
    <button data-speed="normal" class="active">normal</button>
    <button data-speed="fast">rápido</button>
    <span style="width: 1px; background: var(--border); margin: 0 0.3rem;"></span>
    <button id="themeToggle">☽ / ☼</button>
  </div>
</div>

<div class="welcome">
  <h1 class="welcome-title">meowrhino studio</h1>
  <a class="cupon" id="cupon" href="#">
    <span class="precio">485 €</span>
    <span class="caduca" data-i18n="caduca">hasta 31 agosto</span>
  </a>
</div>

<script>
  // --- i18n ---
  const i18n = {
    es: {
      caduca: "hasta 31 agosto",
      subject: "quiero una web",
    },
    en: {
      caduca: "until aug 31",
      subject: "I want a website",
    },
    cat: {
      caduca: "fins 31 d'agost",
      subject: "vull una web",
    },
  };
  let currentLang = "es";

  function applyLang(lang) {
    currentLang = lang;
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const k = el.getAttribute("data-i18n");
      if (i18n[lang] && i18n[lang][k]) el.textContent = i18n[lang][k];
    });
    document.querySelectorAll(".toolbar [data-lang]").forEach(b => {
      b.classList.toggle("active", b.dataset.lang === lang);
    });
    updateMailto();
  }

  function updateMailto() {
    const subject = encodeURIComponent(i18n[currentLang].subject);
    document.getElementById("cupon").href = `mailto:hola@meowrhino.studio?subject=${subject}`;
  }

  document.querySelectorAll(".toolbar [data-lang]").forEach(b => {
    b.addEventListener("click", () => applyLang(b.dataset.lang));
  });

  // --- Theme toggle ---
  const saved = localStorage.getItem("pruebas-theme");
  if (saved === "dark") document.documentElement.setAttribute("data-theme", "dark");
  document.getElementById("themeToggle").addEventListener("click", () => {
    const isDark = document.documentElement.getAttribute("data-theme") === "dark";
    if (isDark) {
      document.documentElement.removeAttribute("data-theme");
      localStorage.setItem("pruebas-theme", "light");
    } else {
      document.documentElement.setAttribute("data-theme", "dark");
      localStorage.setItem("pruebas-theme", "dark");
    }
  });

  // --- Bouncing animation (DVD-style) ---
  const cupon = document.getElementById("cupon");

  const speedPresets = {
    slow: 45,     // px/s
    normal: 90,
    fast: 160,
  };
  let speed = speedPresets.normal;
  let vx = 1, vy = 1; // unit vector, actual magnitude from `speed`

  function randomDirection() {
    // Ángulo evitando casi-horizontal / casi-vertical (feo visualmente)
    const angle = (Math.random() * Math.PI * 2);
    vx = Math.cos(angle);
    vy = Math.sin(angle);
    // Asegurar componente mínima para que no vaya pegado a un eje
    if (Math.abs(vx) < 0.3) vx = vx < 0 ? -0.3 : 0.3;
    if (Math.abs(vy) < 0.3) vy = vy < 0 ? -0.3 : 0.3;
    const m = Math.hypot(vx, vy);
    vx /= m; vy /= m;
  }
  randomDirection();

  // Posición inicial aleatoria (se corrige tras medir tamaño)
  let x = 100, y = 100;

  function getBounds() {
    const rect = cupon.getBoundingClientRect();
    return {
      w: window.innerWidth - rect.width,
      h: window.innerHeight - rect.height,
      cw: rect.width,
      ch: rect.height,
    };
  }

  function placeInitial() {
    const b = getBounds();
    x = Math.random() * b.w;
    y = Math.max(60, Math.random() * b.h); // bajo la toolbar
    cupon.style.transform = `translate(${x}px, ${y}px)`;
  }

  let lastTs = performance.now();
  let paused = false;

  function tick(ts) {
    const dt = Math.min(50, ts - lastTs) / 1000; // cap para evitar saltos
    lastTs = ts;
    if (!paused) {
      const b = getBounds();
      x += vx * speed * dt;
      y += vy * speed * dt;
      if (x <= 0) { x = 0; vx = Math.abs(vx); }
      else if (x >= b.w) { x = b.w; vx = -Math.abs(vx); }
      if (y <= 0) { y = 0; vy = Math.abs(vy); }
      else if (y >= b.h) { y = b.h; vy = -Math.abs(vy); }
      cupon.style.transform = `translate(${x}px, ${y}px)`;
    }
    requestAnimationFrame(tick);
  }

  // Pausar al pasar el ratón por encima (para poder clicar sin perseguirlo)
  cupon.addEventListener("mouseenter", () => { paused = true; });
  cupon.addEventListener("mouseleave", () => { paused = false; });

  // En touch (móvil) no pausamos con hover — el click cierra igualmente
  // Reposicionar al redimensionar
  window.addEventListener("resize", () => {
    const b = getBounds();
    x = Math.min(x, b.w);
    y = Math.min(y, b.h);
  });

  // Speed buttons
  document.querySelectorAll(".toolbar [data-speed]").forEach(b => {
    b.addEventListener("click", () => {
      speed = speedPresets[b.dataset.speed];
      document.querySelectorAll(".toolbar [data-speed]").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
    });
  });

  // Init
  applyLang("es");
  // Esperar a que la fuente cargue para medir bien
  window.addEventListener("load", () => {
    placeInitial();
    lastTs = performance.now();
    requestAnimationFrame(tick);
  });
</script>

</body>
</html>
