<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A · híbrida (nubes + grid)</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700&display=swap");

  :root { --bg: #fff; --text: #000; --muted: #888; --border: rgba(0,0,0,.12); --border-strong: rgba(0,0,0,.4); }

  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: "Inknut Antiqua", serif; overflow: hidden; }

  .stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

  /* Nubes de fondo — muy tenues, solo ambiente */
  .clouds { position: absolute; inset: 0; pointer-events: none; opacity: .35; z-index: 0; }
  .cloud-track { position: absolute; will-change: transform; }
  .cloud-track img { width: 100%; height: 100%; object-fit: contain; filter: saturate(.6); }

  @keyframes drift { 0% { transform: translateX(-40px); } 100% { transform: translateX(calc(100vw + 40px)); } }

  /* Grid principal — la estrella */
  .grid-wrap { position: relative; z-index: 2; width: 100%; height: 100%; overflow-y: auto; padding: 4rem 2rem; box-sizing: border-box; }
  .grid-wrap::-webkit-scrollbar { width: 6px; }
  .grid-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,.2); border-radius: 3px; }

  .header { max-width: 1200px; margin: 0 auto 2rem; text-align: center; }
  .header h1 { font-size: 1.2rem; font-weight: 400; margin: 0; letter-spacing: .05em; }
  .header small { display: block; color: var(--muted); font-size: .72rem; margin-top: .4rem; letter-spacing: .05em; }

  .grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 2.5rem 2rem; }
  .card { display: block; text-decoration: none; color: var(--text); transition: transform .25s ease; }
  .card:hover { transform: translateY(-3px); }
  .thumb { position: relative; width: 100%; aspect-ratio: 4/3; overflow: hidden; }
  .thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity .8s ease; }
  .thumb img.show { opacity: 1; }
  .meta { margin-top: .7rem; display: flex; flex-direction: column; gap: .2rem; text-align: center; }
  .meta .name { font-size: .9rem; font-weight: 500; }
  .meta .url { font-size: .7rem; color: var(--muted); letter-spacing: .02em; transition: color .2s; }
  .card:hover .url { color: var(--text); }

  /* Pie */
  .foot { position: fixed; bottom: 1rem; right: 1.2rem; font-size: .7rem; color: var(--muted); z-index: 3; }
  .foot a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="clouds" id="clouds"></div>

    <div class="grid-wrap">
      <div class="header">
        <h1>portfolio</h1>
        <small>opción A — nubes de ambiente + grid legible</small>
      </div>
      <div class="grid" id="grid"></div>
    </div>

    <div class="foot"><a href="index.html">← volver</a></div>
  </div>

<script type="module">
const proyectos = [
  { nombre: "rikamichie", imagenes: ["rikamichie_0","rikamichie_1","rikamichie_2"], url: "https://rikamichie.com" },
  { nombre: "andrea carilla", imagenes: ["andreacarilla_0","andreacarilla_1"], url: "https://andreacarilla.work" },
  { nombre: "diego san marcos", imagenes: ["diegosanmarcos_0","diegosanmarcos_1","diegosanmarcos_2"], url: "https://diegosanmarcos.com" },
  { nombre: "mike bros", imagenes: ["mikebros_0","mikebros_1"], url: "https://mikebros.com" },
  { nombre: "miranda", imagenes: ["miranda_0","miranda_1","miranda_2"], url: "https://mirandaperezhita.com" },
  { nombre: "conor", imagenes: ["conor_0","conor_1","conor_2"], url: "https://conorashlee.com" },
  { nombre: "maxito", imagenes: ["maxito_0"], url: "https://maxazemar.com" },
  { nombre: "mokakopaTwins", imagenes: ["mokakopatwins_0","mokakopatwins_1","mokakopatwins_2","mokakopatwins_3"], url: "https://mokakopa.com" },
  { nombre: "paula barjau", imagenes: ["paulabarjau_0","paulabarjau_1"], url: "https://paulabarjau.studio" },
  { nombre: "estructuras3000", imagenes: ["estructuras3000_0","estructuras3000_1","estructuras3000_2"], url: "https://estructuras3000.com" },
  { nombre: "berta esteve", imagenes: ["bertaesteve_0","bertaesteve_1"], url: "https://bertaesteve.cat" },
  { nombre: "jaume clotet", imagenes: ["jaumeclotet_0","jaumeclotet_1"], url: "https://jaumeclotet.com" },
  { nombre: "el mundo de las jordis", imagenes: ["elmundodelasjordis_0","elmundodelasjordis_1"], url: "https://elmundodelasjordis.com" },
];

const IMG = (name) => `../img/${name}.webp`;
const cleanUrl = (u) => u.replace(/^https?:\/\//, "").replace(/\/$/, "");

// Grid principal
const grid = document.getElementById("grid");
proyectos.forEach((p, idx) => {
  const a = document.createElement("a");
  a.className = "card";
  a.href = p.url;
  a.target = "_blank";
  a.rel = "noopener";
  a.innerHTML = `
    <div class="thumb">
      ${p.imagenes.map((n, i) => `<img src="${IMG(n)}" alt="${p.nombre}" class="${i === 0 ? "show" : ""}" loading="lazy" />`).join("")}
    </div>
    <div class="meta">
      <span class="url">${cleanUrl(p.url)}</span>
    </div>
  `;
  grid.appendChild(a);

  // Crossfade dentro de la card
  if (p.imagenes.length > 1) {
    const imgs = a.querySelectorAll(".thumb img");
    let i = 0;
    const intervalo = 4000 + Math.random() * 3000;
    setInterval(() => {
      imgs[i].classList.remove("show");
      i = (i + 1) % imgs.length;
      imgs[i].classList.add("show");
    }, intervalo);
  }
});

// Nubes de fondo (decorativas) — una por proyecto, tenues
const cloudsEl = document.getElementById("clouds");
const numBandas = 5;
proyectos.forEach((p, i) => {
  const track = document.createElement("div");
  track.className = "cloud-track";
  const ancho = 120 + Math.random() * 100;
  const alto = ancho * 0.68;
  const banda = i % numBandas;
  const yBase = window.innerHeight * 0.1;
  const yBanda = (window.innerHeight * 0.8) / numBandas;
  const y = yBase + banda * yBanda + Math.random() * yBanda * 0.4;
  track.style.width = ancho + "px";
  track.style.height = alto + "px";
  track.style.top = y + "px";
  track.style.left = (-ancho) + "px";
  const dur = 40 + Math.random() * 30;
  track.style.animation = `drift ${dur}s linear infinite`;
  track.style.animationDelay = `-${Math.random() * dur}s`;
  track.innerHTML = `<img src="${IMG(p.imagenes[0])}" alt="" />`;
  cloudsEl.appendChild(track);
});
</script>
</body>
</html>
